{% extends "base.html" %}
{% block title %}Skills{% endblock %}
{% block content %}

<section id="skills" class="reveal">
  <div class="section-card">
    <h2><span class="h2-icon">⚡</span>Skills &amp; Proficiency</h2>

    <div class="skill-group">
      <div class="skill-label reveal-left">Programming</div>

      <div class="skill-row reveal-left stagger">
        <div class="skill-icon"><i class="devicon-python-plain colored"></i></div>
        <div class="skill-info">
          <div class="skill-name"><span>Python</span><span class="pct">Advanced</span></div>
          <div style="display:flex;gap:12px;align-items:center;">
            <div style="width:72px;">
              <svg viewBox="0 0 36 36" class="circular-chart" width="72" height="72">
                <path class="circle-bg" d="M18 2.0845a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#eef5f6" stroke-width="2.8"></path>
                <path class="circle" stroke-dasharray="85,100" d="M18 2.0845a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#2E6E6E" stroke-width="2.8" stroke-linecap="round"></path>
                <text x="18" y="20.5" class="percentage" font-size="7" text-anchor="middle" fill="#16213E">85%</text>
              </svg>
            </div>
            <div style="flex:1"><div class="skill-bar"><div class="skill-bar-fill" data-width="85"></div></div></div>
          </div>
        </div>
      </div>

      <div class="skill-row reveal-left stagger">
        <div class="skill-icon"><i class="devicon-mysql-plain colored"></i></div>
        <div class="skill-info">
          <div class="skill-name"><span>SQL</span><span class="pct">Proficient</span></div>
          <div style="display:flex;gap:12px;align-items:center;">
            <div style="width:72px;">
              <svg viewBox="0 0 36 36" class="circular-chart" width="72" height="72">
                <path class="circle-bg" d="M18 2.0845a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#eef5f6" stroke-width="2.8"></path>
                <path class="circle" stroke-dasharray="78,100" d="M18 2.0845a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#E2703A" stroke-width="2.8" stroke-linecap="round"></path>
                <text x="18" y="20.5" class="percentage" font-size="7" text-anchor="middle" fill="#16213E">78%</text>
              </svg>
            </div>
            <div style="flex:1"><div class="skill-bar"><div class="skill-bar-fill accent-fill" data-width="78"></div></div></div>
          </div>
        </div>
      </div>

    </div>

    <div class="skill-group">
      <div class="skill-label reveal-left">Tools</div>
      <div class="chips stagger">
        <span class="chip reveal-scale">Excel</span>
        <span class="chip reveal-scale">Google Data Studio</span>
        <span class="chip reveal-scale">Cloud Architecture</span>
      </div>
    </div>

  </div>
</section>

{% endblock %}
