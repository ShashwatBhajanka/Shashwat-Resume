<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{name}} — {% block title %}Resume{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600[...]
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
<style>
  :root{
    --paper:#FAFBFC;
    --grid:#DCE3EA;
    --ink:#16213E;
    --ink-soft:#4A5570;
    --ink-muted:#7B8799;
    --accent:#E2703A;
    --accent-glow:rgba(226,112,58,.18);
    --teal:#2E6E6E;
    --teal-tint:#E4EFEF;
    --teal-glow:rgba(46,110,110,.12);
    --line:#CBD3DC;
    --card-bg:#FFFFFF;
    --shadow:0 2px 12px rgba(22,33,62,.06);
    --radius:10px;
    --transition: 0.35s cubic-bezier(.4,0,.2,1);
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  html{ scroll-behavior: smooth; }

  body{
    background-color: var(--paper);
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 28px 28px;
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    line-height: 1.6;
    padding-top: 68px;
    will-change: background-position;
  }

  /* ===== NAVIGATION ===== */
  nav{ position: fixed; top:0; left:0; right:0; z-index: 1000; background: rgba(250,251,252,.82); backdrop-filter: blur(14px) saturate(1.3); -webkit-backdrop-filter: blur(14px) saturate(1.3); border-bottom: 1px solid var(--line); transition: box-shadow var(--transition); }
  nav.scrolled{ box-shadow: 0 1px 20px rgba(22,33,62,.08); }
  .nav-inner{ max-width: 760px; margin: 0 auto; display: flex; align-items: center; padding: 0 16px; height: 56px; overflow-x: auto; gap: 4px; -webkit-overflow-scrolling: touch; }
  .nav-brand{ font-family:'IBM Plex Mono', monospace; font-size: 12px; font-weight:500; color: var(--ink-soft); white-space: nowrap; margin-right: 12px; flex-shrink:0; }
  .nav-brand span{ color: var(--accent); }
  .nav-link{ flex-shrink:0; font-family:'IBM Plex Mono', monospace; font-size: 11.5px; font-weight:500; color: var(--ink-muted); background: transparent; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: background var(--transition), color var(--transition); text-decoration: none; white-space: nowrap; position: relative; }
  .nav-link:hover{ color: var(--ink); background: var(--teal-tint); }
  .nav-link.active{ color: var(--teal); background: var(--teal-glow); }

  /* tiny animated underline for active nav */
  .nav-link::after{ content: ''; position: absolute; left: 12px; right: 12px; bottom: 6px; height: 2px; background: transparent; border-radius: 2px; transition: background .25s; }
  .nav-link.active::after{ background: linear-gradient(90deg,var(--teal),var(--accent)); }

  /* ===== PAGE ENTRANCE ===== */
  .page{ max-width: 760px; margin: 0 auto; padding: 40px 24px 80px; animation: pageFadeIn 0.7s ease forwards; }
  @keyframes pageFadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  /* ===== REVEAL & MOTION ===== */
  .reveal{ opacity:0; transform: translateY(28px); transition: opacity 0.7s cubic-bezier(.4,0,.2,1), transform 0.7s cubic-bezier(.4,0,.2,1); }
  .reveal.visible{ opacity:1; transform: translateY(0); }
  .reveal-left { opacity: 0; transform: translateX(-30px); transition: opacity 0.7s cubic-bezier(.4,0,.2,1), transform 0.7s cubic-bezier(.4,0,.2,1); }
  .reveal-left.visible { opacity: 1; transform: translateX(0); }
  .reveal-scale { opacity: 0; transform: scale(.96); transition: opacity .6s, transform .6s; }
  .reveal-scale.visible{ opacity:1; transform:scale(1); }

  /* ===== HERO ===== */
  .hero{ position: relative; padding: 24px 0 8px; margin-bottom: 10px; }
  .hero-accent{ width: 52px; height: 3px; background: linear-gradient(90deg, var(--accent), var(--teal)); border-radius: 2px; margin-bottom: 18px; }

  /* ===== SECTIONS / CARDS ===== */
  .section-card{ background: var(--card-bg); border: 1px solid var(--line); border-radius: var(--radius); padding: 28px 30px; box-shadow: var(--shadow); transition: box-shadow var(--transition), transform var(--transition); }
  .section-card:hover{ box-shadow: 0 8px 32px rgba(22,33,62,.1); transform: translateY(-2px); }

  /* explorer cards: support medium thumbnail on left */
  .explorer-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .explorer-card { position: relative; display: flex; flex-direction: column; text-decoration: none; background: var(--card-bg); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); transition: all var(--transition); overflow: hidden; cursor: pointer; }
  .explorer-card.has-thumb { flex-direction: row; align-items: center; gap: 14px; }
  .explorer-card .thumb { width: 96px; height: 72px; border-radius: 8px; object-fit: cover; flex-shrink:0; background: #f4f6f8; border: 1px solid #eef2f5; }
  .explorer-card .meta { display:flex; flex-direction:column; align-items:flex-start; gap:6px; }
  .explorer-card h3{ font-family: 'Fraunces', serif; font-size: 16px; margin:0; color:var(--ink); }
  .explorer-card p{ margin:0; color:var(--ink-soft); font-size:13px; }

  /* entry thumbnails for timeline */
  .entry-thumb { width:48px; height:48px; border-radius:8px; object-fit:cover; margin-right:10px; flex-shrink:0; }
  .entry .org { display:flex; align-items:center; gap:8px; }

  /* badges & small cert thumbs */
  .badge-thumb { width:40px; height:28px; object-fit:cover; border-radius:6px; margin-right:10px; }

  /* modal / lightbox */
  .image-modal{ position: fixed; inset:0; display:none; align-items:center; justify-content:center; background: rgba(6,10,14,.6); z-index:2000; }
  .image-modal.open{ display:flex; }
  .image-modal-inner{ max-width: 90%; max-height: 85%; background: transparent; border-radius:8px; padding:8px; }
  .image-modal-inner img{ display:block; max-width:100%; max-height:80vh; border-radius:6px; }
  .image-modal-close{ position: absolute; top:18px; right:18px; background:transparent; border:none; color: white; font-size:22px; cursor:pointer; }

  /* small tweaks */
  .btt{ position: fixed; bottom: 28px; right: 28px; width: 44px; height: 44px; border-radius: 50%; background: var(--card-bg); border: 1px solid var(--line); box-shadow: var(--shadow); display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; transform: translateY(16px) scale(.9); transition: opacity .35s ease, transform .35s ease; pointer-events: none; z-index: 999; }
  .btt.visible{ opacity:1; transform: translateY(0) scale(1); pointer-events:auto; }

  @media (max-width: 900px){ .explorer-grid { grid-template-columns: repeat(2,1fr); } .explorer-card.has-thumb{ flex-direction: row; } }
  @media (max-width: 480px){ .explorer-grid { grid-template-columns: 1fr; } .explorer-card.has-thumb{ flex-direction: column; } .explorer-card .thumb{ width:100%; height:140px; } }
</style>
</head>
<body>

  <!-- ===== NAVIGATION ===== -->
  <nav id="navbar">
    <div class="nav-inner">
      <span class="nav-brand"><span>SB</span> · Resume</span>
      <a class="nav-link{% if section == 'home' %} active{% endif %}" href="{% url 'home' %}">Home</a>
      <a class="nav-link{% if section == 'education' %} active{% endif %}" href="{% url 'education' %}">Education</a>
      <a class="nav-link{% if section == 'experience' %} active{% endif %}" href="{% url 'experience' %}">Experience</a>
      <a class="nav-link{% if section == 'clubs' %} active{% endif %}" href="{% url 'clubs' %}">Clubs</a>
      <a class="nav-link{% if section == 'skills' %} active{% endif %}" href="{% url 'skills' %}">Skills</a>
      <a class="nav-link{% if section == 'achievements' %} active{% endif %}" href="{% url 'achievements' %}">More</a>
    </div>
  </nav>

  <!-- ===== BACK TO TOP ===== -->
  <button class="btt" id="btt" aria-label="Back to top">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="18 15 12 9 6 15"/>
    </svg>
  </button>

  <div class="page">

    {% block content %}{% endblock %}

    <footer>
      <span>Built with <span class="footer-hearts">✦</span> by {{name}}</span>
      <span>Last updated · June 2026</span>
    </footer>

  </div>

  <!-- image modal used across site -->
  <div id="image-modal" class="image-modal" aria-hidden="true" role="dialog">
    <button class="image-modal-close" aria-label="Close">✕</button>
    <div class="image-modal-inner">
      <img id="image-modal-img" src="" alt="">
      <p id="image-modal-caption" class="image-caption" style="color:white;margin-top:8px;text-align:center;"></p>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      /* ---------- REVEAL ANIMATIONS ---------- */
      const revealEls = document.querySelectorAll('.reveal, .reveal-left, .reveal-scale');
      const ro = new IntersectionObserver((entries) => {
        entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
      }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
      revealEls.forEach(el => ro.observe(el));

      /* ---------- STAGGER CHILDREN ---------- */
      document.querySelectorAll('.stagger').forEach(parent => {
        Array.from(parent.children).forEach((child, i) => { child.style.transitionDelay = `${0.05 + i * 0.04}s`; });
      });

      /* ---------- SKILL BAR ANIMATION ---------- */
      const barFills = document.querySelectorAll('.skill-bar-fill');
      const barObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const el = entry.target;
            const w = el.getAttribute('data-width');
            if (w) el.style.width = w + '%';
            barObserver.unobserve(el);
          }
        });
      }, { threshold: 0.5 });
      barFills.forEach(el => barObserver.observe(el));

      /* ---------- NAV SCROLLED STATE & BACK TO TOP ---------- */
      const navBar = document.getElementById('navbar');
      const btt = document.getElementById('btt');
      function onScroll() { navBar.classList.toggle('scrolled', window.scrollY > 30); btt.classList.toggle('visible', window.scrollY > 500); }
      window.addEventListener('scroll', onScroll, { passive: true });
      btt.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

      /* ---------- PARALLAX GRID (subtle) ---------- */
      let ticking = false;
      window.addEventListener('scroll', () => {
        if (!ticking) {
          window.requestAnimationFrame(() => {
            document.body.style.backgroundPosition = `0px ${window.pageYOffset * 0.28}px`;
            ticking = false;
          });
          ticking = true;
        }
      }, { passive: true });

      /* ---------- NAV HIGHLIGHT (for single-page sections) ---------- */
      (function navHighlight(){
        const navLinks = Array.from(document.querySelectorAll('.nav-link'));
        const sections = navLinks.map(a => {
          try { return document.querySelector(a.getAttribute('href')) } catch(e){ return null }
        }).filter(Boolean);
        if (!sections.length) return;
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const id = entry.target.id;
              navLinks.forEach(l => l.classList.toggle('active', l.getAttribute('href') === `#${id}` || l.getAttribute('href')?.endsWith(id)));
            }
          });
        }, { threshold: 0.55 });
        sections.forEach(s => observer.observe(s));
      })();

      /* ---------- IMAGE MODAL (delegated) ---------- */
      (function imageModal(){
        const modal = document.getElementById('image-modal');
        const img = document.getElementById('image-modal-img');
        const caption = document.getElementById('image-modal-caption');
        const close = modal.querySelector('.image-modal-close');

        function open(src, alt){ img.src = src; img.alt = alt || ''; caption.textContent = alt || ''; modal.classList.add('open'); modal.setAttribute('aria-hidden','false'); }
        function closeModal(){ modal.classList.remove('open'); modal.setAttribute('aria-hidden','true'); img.src=''; }

        document.addEventListener('click', (e) => {
          const t = e.target.closest('[data-open-image]');
          if (t) { e.preventDefault(); open(t.dataset.openImage, t.dataset.caption); }
        });
        close.addEventListener('click', closeModal);
        modal.addEventListener('click', (e)=>{ if (e.target === modal) closeModal(); });
        document.addEventListener('keydown', (e)=>{ if (e.key === 'Escape') closeModal(); });
      })();

      /* ---------- PARALLAX ELEMENTS (decorative) ---------- */
      (function parallaxEls(){
        if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
        const els = document.querySelectorAll('[data-parallax]');
        if (!els.length) return;
        let ticking = false;
        window.addEventListener('scroll', () => {
          if (!ticking) {
            window.requestAnimationFrame(() => {
              const y = window.scrollY;
              els.forEach(el => { const speed = parseFloat(el.dataset.parallax) || 0.12; el.style.transform = `translateY(${Math.round(y * speed)}px)`; });
              ticking = false;
            });
            ticking = true;
          }
        }, { passive: true });
      })();

      /* ---------- INITIALIZE ---------- */
      onScroll();
    })();
  </script>

</body>
</html>
